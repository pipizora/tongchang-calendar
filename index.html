  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;div id=&quot;stage-calendar-app&quot; class=&quot;stage-app&quot;&gt;
  &lt;style&gt;
    #stage-calendar-app { color: var(--foreground); font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, &quot;PingFang SC&quot;, &quot;Microsoft YaHei&quot;, sans-serif; max-width: 1180px; margin: 0 auto; padding: 18px; }
    #stage-calendar-app * { box-sizing: border-box; letter-spacing: 0; }
    #stage-calendar-app button, #stage-calendar-app input, #stage-calendar-app select { font: inherit; }
    #stage-calendar-app .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
    #stage-calendar-app .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    #stage-calendar-app .brand-mark { width: 40px; height: 40px; flex: 0 0 40px; display: grid; place-items: center; border-radius: 8px; color: var(--primary-foreground); background: var(--primary); }

    #stage-calendar-app .top-actions, #stage-calendar-app .month-nav, #stage-calendar-app .filter-list, #stage-calendar-app .legend, #stage-calendar-app .event-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #stage-calendar-app .icon-btn { width: 36px; height: 36px; padding: 0; display: inline-grid; place-items: center; }
    #stage-calendar-app .overview { display: grid; grid-template-columns: minmax(0, 1fr) 248px; gap: 24px; align-items: start; }
    #stage-calendar-app .calendar-area { min-width: 0; }
    #stage-calendar-app .calendar-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
    #stage-calendar-app .month-title { display: flex; align-items: baseline; gap: 9px; }
    #stage-calendar-app .month-title h1 { font-size: 25px; font-weight: 500; margin: 0; }
    #stage-calendar-app .month-title span { color: var(--muted-foreground); font-size: 13px; }
    #stage-calendar-app .filters { margin: 0 0 16px; }
    #stage-calendar-app .filter-chip { border: 1px solid var(--border); background: transparent; color: var(--foreground); border-radius: 999px; padding: 6px 11px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    #stage-calendar-app .filter-chip[aria-pressed=&quot;true&quot;] { color: var(--primary-foreground); background: var(--primary); border-color: var(--primary); }
    #stage-calendar-app .avatar-dot { width: 18px; height: 18px; border-radius: 50%; display: inline-grid; place-items: center; background: color-mix(in srgb, var(--viz-series-2) 22%, var(--card)); font-size: 10px; color: var(--foreground); }
    #stage-calendar-app .calendar { border-top: 1px solid var(--border); border-left: 1px solid var(--border); display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }
    #stage-calendar-app .weekday { min-height: 36px; padding: 9px 8px; color: var(--muted-foreground); font-size: 12px; text-align: center; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    #stage-calendar-app .day { appearance: none; text-align: left; color: var(--foreground); background: transparent; border: 0; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 126px; padding: 8px; cursor: pointer; overflow: hidden; }
    #stage-calendar-app .day:hover { background: color-mix(in srgb, var(--accent) 50%, transparent); }
    #stage-calendar-app .day.is-selected { background: var(--accent); box-shadow: inset 0 0 0 2px var(--primary); }
    #stage-calendar-app .day.is-outside { color: var(--muted-foreground); background: color-mix(in srgb, var(--muted) 30%, transparent); }
    #stage-calendar-app .day-number { width: 25px; height: 25px; display: grid; place-items: center; border-radius: 50%; font-size: 13px; margin-bottom: 5px; }
    #stage-calendar-app .day.is-today .day-number { background: var(--primary); color: var(--primary-foreground); }
    #stage-calendar-app .event-pill { display: block; width: 100%; margin-top: 5px; padding: 5px 6px; border-radius: 4px; overflow: hidden; background: color-mix(in srgb, var(--viz-series-1) 18%, transparent); border-left: 3px solid var(--viz-series-1); font-size: 11px; }
    #stage-calendar-app .event-main { display: flex; align-items: baseline; gap: 4px; min-width: 0; }
    #stage-calendar-app .event-time { flex: 0 0 auto; color: var(--muted-foreground); font-size: 10px; }
    #stage-calendar-app .event-title { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 500; }
    #stage-calendar-app .event-venue { display: block; margin-top: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: var(--muted-foreground); font-size: 10px; }
    #stage-calendar-app .event-people { display: flex; align-items: center; margin-top: 5px; min-height: 18px; }
    #stage-calendar-app .event-avatar { width: 18px; height: 18px; flex: 0 0 18px; display: grid; place-items: center; margin-right: -4px; border: 1px solid var(--background); border-radius: 50%; background: var(--secondary); color: var(--secondary-foreground); font-size: 9px; }
    #stage-calendar-app .event-avatar-more { margin-left: 7px; color: var(--muted-foreground); font-size: 9px; }
    #stage-calendar-app .event-pill.play { background: color-mix(in srgb, var(--viz-series-2) 18%, transparent); border-left-color: var(--viz-series-2); }
    #stage-calendar-app .event-pill.dance { background: color-mix(in srgb, var(--viz-series-3) 18%, transparent); border-left-color: var(--viz-series-3); }
    #stage-calendar-app .event-pill.other { background: color-mix(in srgb, var(--viz-series-4) 18%, transparent); border-left-color: var(--viz-series-4); }
    #stage-calendar-app .more { color: var(--muted-foreground); font-size: 11px; margin-top: 4px; padding-left: 2px; }
    #stage-calendar-app .side { position: sticky; top: 12px; }
    #stage-calendar-app .side-date { margin: 0 0 4px; font-size: 18px; font-weight: 500; }
    #stage-calendar-app .side-sub { color: var(--muted-foreground); font-size: 13px; margin-bottom: 14px; }
    #stage-calendar-app .event-detail { padding: 14px 0; border-top: 1px solid var(--border); }
    #stage-calendar-app .event-detail:first-of-type { border-top: 0; }
    #stage-calendar-app .event-kind { display: flex; align-items: center; gap: 7px; color: var(--muted-foreground); font-size: 12px; margin-bottom: 7px; }
    #stage-calendar-app .kind-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--viz-series-1); }
    #stage-calendar-app .event-detail h3 { font-size: 16px; font-weight: 500; margin: 0 0 7px; }
    #stage-calendar-app .meta { display: grid; gap: 5px; font-size: 13px; }
    #stage-calendar-app .meta span { display: flex; align-items: center; gap: 7px; }
    #stage-calendar-app .people { display: flex; align-items: center; margin-top: 10px; }
    #stage-calendar-app .person { width: 27px; height: 27px; border-radius: 50%; border: 2px solid var(--background); margin-right: -6px; display: grid; place-items: center; background: var(--secondary); color: var(--secondary-foreground); font-size: 11px; }
    #stage-calendar-app .person-count { margin-left: 12px; color: var(--muted-foreground); font-size: 12px; }
    #stage-calendar-app .alert { display: flex; gap: 8px; align-items: flex-start; padding: 9px 10px; margin-top: 10px; border-radius: 6px; color: var(--destructive); background: color-mix(in srgb, var(--destructive) 10%, transparent); font-size: 12px; }
    #stage-calendar-app .empty { color: var(--muted-foreground); text-align: center; padding: 30px 10px; }
    #stage-calendar-app .empty i { display: block; margin: 0 auto 10px; }
    #stage-calendar-app .legend { margin-top: 12px; color: var(--muted-foreground); font-size: 11px; }
    #stage-calendar-app .legend span { display: inline-flex; align-items: center; gap: 5px; }
    #stage-calendar-app .legend-dot { width: 8px; height: 8px; border-radius: 2px; background: var(--viz-series-1); }
    #stage-calendar-app .legend-dot.play { background: var(--viz-series-2); }
    #stage-calendar-app .legend-dot.dance { background: var(--viz-series-3); }
    #stage-calendar-app dialog { width: min(520px, calc(100% - 28px)); max-height: 88%; padding: 0; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--card-foreground); }
    #stage-calendar-app dialog::backdrop { background: color-mix(in srgb, var(--foreground) 32%, transparent); }
    #stage-calendar-app .dialog-head { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid var(--border); }
    #stage-calendar-app .dialog-head h2 { font-size: 18px; font-weight: 500; margin: 0; }
    #stage-calendar-app .dialog-body { padding: 18px 20px; display: grid; gap: 14px; }
    #stage-calendar-app .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    #stage-calendar-app .form-label { display: grid; gap: 6px; color: var(--muted-foreground); font-size: 12px; }
    #stage-calendar-app .form-control, #stage-calendar-app .form-select { width: 100%; color: var(--foreground); background: var(--background); border: 1px solid var(--input); border-radius: 6px; padding: 9px 10px; }
    #stage-calendar-app .checks { display: flex; gap: 12px; flex-wrap: wrap; padding: 5px 0; }
    #stage-calendar-app .dialog-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); }
    #stage-calendar-app .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); padding: 9px 14px; border-radius: 6px; color: var(--primary-foreground); background: var(--primary); z-index: 20; box-shadow: 0 8px 24px color-mix(in srgb, var(--foreground) 18%, transparent); }
    #stage-calendar-app .auth-shell { max-width: 420px; margin: 56px auto; }
    #stage-calendar-app .auth-shell h1 { margin: 0 0 8px; font-size: 24px; font-weight: 500; }

    #stage-calendar-app .auth-form { display: grid; gap: 14px; }
    #stage-calendar-app .auth-status { min-height: 18px; color: var(--muted-foreground); font-size: 12px; }
    #stage-calendar-app .account { display: flex; align-items: center; gap: 8px; }

    #stage-calendar-app [hidden] { display: none !important; }
    @media (max-width: 780px) {

      #stage-calendar-app .side { position: static; }

      #stage-calendar-app .field-row { grid-template-columns: 1fr; }
    }
